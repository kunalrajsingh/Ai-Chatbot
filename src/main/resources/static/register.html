<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#020617;padding:30px;border-radius:10px;width:300px}
input,button{width:100%;margin-top:10px;padding:10px;border-radius:6px;border:none}
button{background:#22c55e;color:white;cursor:pointer}
</style>
</head>

<body>

<div class="box">
<h2>Register</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<p>Already user? <a href="login.html" style="color:#22c55e;">Login</a></p>
</div>

<script>
async function register(){

const res = await fetch("/api/auth/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:username.value,
password:password.value
})
});

alert(await res.text());
}
</script>

</body>
</html>
